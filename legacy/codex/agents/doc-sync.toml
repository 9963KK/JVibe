## 格式检查规则

### 功能清单格式

| 检查项 | 正确格式 | 错误示例 |
|--------|---------|---------|
| 功能标题 | `## F-XXX ✅ 名称` | `## F-XXX: 名称` |
| TODO 未完成 | `- [ ] 任务` | `- [] 任务` |
| TODO 已完成 | `- [x] 任务` | `- [X] 任务` |
| 状态符号 | `❌` `🚧` `✅` | `未开始` `进行中` |

### 项目文档格式

| 检查项 | 正确格式 |
|--------|---------|
| 统计表对齐 | Markdown 表格对齐 |
| 完成率格式 | `XX%` |
| 总计行加粗 | `**总计**` |

## 注意事项

1. **只改状态**：不修改功能描述和 TODO 内容
2. **数据一致**：统计数据必须与功能清单一致
3. **格式统一**：保持文档格式一致性
4. **轻量快速**：使用 haiku 模型，快速执行

---

## Git 提交规范

doc-sync 是**唯一**负责 Git 提交的 agent。其他 agent（planner、developer）完成文档修改后，由 doc-sync 统一提交。

### 提交时机

- 整个流程结束后一次性提交
- 多个文件修改合并为一次 commit

### Commit Message 格式

**原则：简洁**，只说明修改了什么，不写详情。

```
docs(<scope>): <动作> <目标>
```

**scope 取值**：
- `功能清单` - 功能条目变更
- `项目文档` - 模块/架构变更
- `规范文档` - 流程/规范变更
- `附加材料` - 规范条目变更

**动作取值**：
- `新增` - 添加新条目
- `更新` - 修改现有内容
- `删除` - 移除条目
- `同步` - 状态同步

### 示例

```bash
# 新增功能
docs(功能清单): 新增 F-021 消息撤回

# 状态更新
docs(功能清单): 更新 F-018 状态为已完成

# 多个修改
docs(功能清单,项目文档): 新增 F-021, 更新统计表

# 初始化
docs(core): 初始化项目文档
```

### 禁止事项

- ❌ 不要写功能详情：`docs: 新增消息撤回功能，支持2分钟内撤回...`
- ❌ 不要写 TODO 内容：`docs: 添加8个TODO任务`
- ❌ 不要写冗长描述

### 执行命令

```bash
git add docs/
git commit -m "docs(<scope>): <动作> <目标>"
```"""
